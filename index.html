    <script>
    const BTN_COLOR = '#EA580C';
    let ingCount = 0;

    document.addEventListener('DOMContentLoaded', () => {
      // Enterキーで計算
      document.querySelectorAll('input').forEach(inp => {
        inp.addEventListener('keydown', e => { if (e.key === 'Enter') calculate(); });
        inp.addEventListener('input', () => { if (document.querySelectorAll('input[type="number"]').length === 1) calculate(); });
      });
      // デフォルト材料をいくつか追加
      const defaults = [
        { name: '鶏もも肉', amount: '300', unit: 'g' },
        { name: '玉ねぎ', amount: '1', unit: '個' },
        { name: '醤油', amount: '大さじ2', unit: '' },
        { name: '砂糖', amount: '小さじ1', unit: '' },
      ];
      defaults.forEach(d => addIngredient(d.name, d.amount, d.unit));
    });

    function addIngredient(name='', amount='', unit='') {
      ingCount++;
      const id = ingCount;
      const row = document.createElement('div');
      row.className = 'ingredient-row';
      row.id = 'ing-row-' + id;
      row.innerHTML = `
        <input class="ing-name" type="text" placeholder="例: 鶏もも肉" value="${name}" id="ing-name-${id}">
        <input class="ing-amount" type="text" placeholder="300" value="${amount}" id="ing-amount-${id}">
        <input class="ing-unit" type="text" placeholder="g" value="${unit}" id="ing-unit-${id}">
        <button class="del-btn" onclick="removeIngredient(${id})" title="削除">×</button>
      `;
      document.getElementById('ingredient-list').appendChild(row);
    }

    function removeIngredient(id) {
      const row = document.getElementById('ing-row-' + id);
      if (row) row.remove();
    }

    function parseAmount(str) {
      // 「大さじ2」「小さじ1/2」「300」などをパース
      str = String(str).trim();
      const fractionMatch = str.match(/(\d+)\/(\d+)/);
      if (fractionMatch) {
        return parseFloat(fractionMatch[1]) / parseFloat(fractionMatch[2]);
      }
      // 大さじ・小さじのプレフィックスを処理
      const prefixMatch = str.match(/^(大さじ|小さじ)(\d+(\.\d+)?)/);
      if (prefixMatch) {
        const prefix = prefixMatch[1];
        const num = parseFloat(prefixMatch[2]);
        return { prefix, num };
      }
      const num = parseFloat(str.replace(/[^0-9.]/g, ''));
      return isNaN(num) ? null : num;
    }

    function formatAmount(original, ratio) {
      const str = String(original).trim();
      const prefixMatch = str.match(/^(大さじ|小さじ)(\d+(\.\d+)?)/);
      if (prefixMatch) {
        const prefix = prefixMatch[1];
        const num = parseFloat(prefixMatch[2]);
        const scaled = num * ratio;
        const nice = formatNumber(scaled);
        return prefix + nice;
      }
      const fractionMatch = str.match(/(\d+)\/(\d+)/);
      if (fractionMatch) {
        const num = parseFloat(fractionMatch[1]) / parseFloat(fractionMatch[2]);
        return formatNumber(num * ratio);
      }
      const num = parseFloat(str);
      if (!isNaN(num)) {
        return formatNumber(num * ratio);
      }
      return str; // 数値でない場合そのまま返す（「適量」など）
    }

    function formatNumber(n) {
      if (n === Math.round(n)) return String(Math.round(n));
      // 1桁小数で表現
      const r1 = Math.round(n * 10) / 10;
      if (r1 === Math.round(r1)) return String(Math.round(r1));
      return r1.toFixed(1);
    }

    function calculate() {
      const fromServing = parseFloat(document.getElementById('from-serving').value);
      const toServing = parseFloat(document.getElementById('to-serving').value);

      if (!fromServing || fromServing <= 0) { alert('元の人数を入力してください'); return; }
      if (!toServing || toServing <= 0) { alert('作りたい人数を入力してください'); return; }

      const ratio = toServing / fromServing;

      // 材料行を収集
      const rows = document.querySelectorAll('[id^="ing-row-"]');
      const tbody = document.getElementById('result-body');
      tbody.innerHTML = '';
      let hasData = false;

      rows.forEach(row => {
        const idMatch = row.id.match(/ing-row-(\d+)/);
        if (!idMatch) return;
        const id = idMatch[1];
        const name = (document.getElementById('ing-name-' + id).value || '').trim();
        const amount = (document.getElementById('ing-amount-' + id).value || '').trim();
        const unit = (document.getElementById('ing-unit-' + id).value || '').trim();
        if (!name && !amount) return;
        hasData = true;

        const scaledAmount = amount ? formatAmount(amount, ratio) : '';
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${name || '—'}</td>
          <td class="amount-col">${scaledAmount}</td>
          <td>${unit}</td>
        `;
        tbody.appendChild(tr);
      });

      if (!hasData) { alert('材料を1つ以上入力してください'); return; }

      const scalePct = Math.round(ratio * 100);
      document.getElementById('scale-info').textContent =
        `${fromServing}人前 → ${toServing}人前（×${ratio % 1 === 0 ? ratio : ratio.toFixed(2)}）`;

      document.getElementById('output').textContent = '';
      document.getElementById('detail').textContent = '';
      document.getElementById('result').classList.add('show');
    }
    </script>
